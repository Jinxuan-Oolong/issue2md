name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  ai-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read # 需要讀取程式碼

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # 取得足夠的歷史紀錄以便進行 diff
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.0'

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Configure Claude Code with Zhipu AI
        env:
          ZHIPU_API_KEY: ${{ secrets.ZHIPU_API_KEY }}
        run: |
          mkdir -p ~/.claude
          echo '{
            "env": {
              "ANTHROPIC_BASE_URL": "https://open.bigmodel.cn/api/anthropic",
              "ANTHROPIC_API_KEY": "'"$ZHIPU_API_KEY"'"
            }
          }' > ~/.claude/settings.json
      - name: Run AI Review in Headless Mode
        id: review
        run: |
          # 準備 Prompt
          PROMPT="你是一個資深的 Go 程式碼審查員。請分析本次 Pull Request 中的程式碼變更，重點關注潛在的 bug、不符合 Go 語言慣用風格的地方，以及效能問題。以 Markdown 列表形式輸出你的審查建議。如果沒有任何問題，請回覆：「程式碼品質良好，沒有發現明顯問題。」"

          # 取得 diff 內容並傳送給 Claude
          # ${ { github.base_ref } } 指向目標分支
          # ${ { github.head_ref } } 指向來源分支

          git diff origin/${{ github.base_ref }}...origin/${{ github.head_ref }} \
            | claude -p "$PROMPT" --output-format json > result.json

          # 檢查執行結果
          if [ $? -ne 0 ]; then
            echo "AI review command failed."
            exit 1
          fi

          # 提取審查報告，並設定為 Action 的輸出
          REPORT=$(jq -r '.result' result.json)

          # 將多行字串轉換為 GitHub Actions 輸出格式
          echo "report_content<<EOF" >> $GITHUB_OUTPUT
          echo "$REPORT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Post Review Comment to PR
        uses: actions/github-script@v7
        with:
          script: |
            const report = `${{ steps.review.outputs.report_content }}`;

            // 只有當報告不是預設的「無問題」提示時，才發表評論
            if (report && !report.includes("沒有發現明顯問題")) {
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `### 🤖 AI Code Review\n\n${report}`
              });
            } else {
              console.log("AI review found no issues, skipping comment.");
            }
