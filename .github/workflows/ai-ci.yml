name: AI CI

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Test / Lint / Build
  # 所有推送到 main 與所有 PR 皆觸發
  # ---------------------------------------------------------------------------
  ci:
    name: Test / Lint / Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: make test

      - name: Run lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

      - name: Build binaries
        run: make build

  # ---------------------------------------------------------------------------
  # Job 2: AI Code Review
  # 僅在 PR 事件時觸發，依賴 ci job 通過後才執行
  # ---------------------------------------------------------------------------
  ai-review:
    name: AI Code Review
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'pull_request'

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Configure Claude
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          mkdir -p ~/.claude
          echo '{
            "env": {
              "ANTHROPIC_API_KEY": "'"$ANTHROPIC_API_KEY"'"
            }
          }' > ~/.claude/settings.json

      - name: Run AI Review
        id: review
        run: |
          PROMPT="你是一個資深 Go 程式碼審查員。
          請審查這次 Pull Request 的程式碼變更。
          關注：
          - bug
          - Go best practice
          - concurrency問題
          - performance問題

          如果沒有問題，請回答：沒有發現明顯問題。"

          git diff origin/${{ github.base_ref }}...origin/${{ github.head_ref }} \
          | claude -p "$PROMPT" --output-format json > result.json

          REPORT=$(jq -r '.result' result.json)

          echo "report<<EOF" >> $GITHUB_OUTPUT
          echo "$REPORT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Comment PR
        uses: actions/github-script@v7
        with:
          script: |
            const report = `${{ steps.review.outputs.report }}`

            if (!report.includes("沒有發現明顯問題")) {
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `## 🤖 AI Code Review\n\n${report}`
              })
            }
